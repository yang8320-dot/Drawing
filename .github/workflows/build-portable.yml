name: Build Portable Notification Center

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4 # 已升級至 v4 以符合最新安全規範

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2 # 升級至 v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2 # 升級至 v2

    - name: Restore NuGet Packages
      # 請確保檔名與你的方案檔名一致
      run: nuget restore NotificationCenter.sln 

    - name: Build Project
      run: msbuild NotificationCenter.sln /p:Configuration=Release /p:Platform="Any CPU"

    - name: Organize Files and Folder Structure
      shell: powershell
      run: |
        $outDir = "PortableRelease"
        $libDir = "$outDir\Library"
        New-Item -ItemType Directory -Force -Path $libDir
        
        # 請將 NotificationCenter 替換為實際的專案資料夾名稱
        $binDir = "NotificationCenter\bin\Release"
        
        Copy-Item "$binDir\*.exe" -Destination $outDir
        Copy-Item "$binDir\*.config" -Destination $outDir
        Copy-Item "$binDir\*.dll" -Destination $libDir
        
        Compress-Archive -Path "$outDir\*" -DestinationPath "NotificationCenter_Portable.zip"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4 # 已修正：升級至 v4，解決被拒絕的問題
      with:
        name: Portable-Notification-Center
        path: NotificationCenter_Portable.zip

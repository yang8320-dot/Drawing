name: Build and Package Drawing App

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: nuget/setup-nuget@v2.0.0

    - name: Restore NuGet Packages
      run: msbuild DrawingApp.csproj -t:restore /p:Configuration=Release

    - name: Build Application
      run: msbuild DrawingApp.csproj /p:Configuration=Release /p:TargetFramework=net472

    - name: Reorganize Output (Portable Structure)
      shell: pwsh
      run: |
        $releaseDir = "bin\Release\net472"
        $publishDir = "PublishOutput"
        $appCoreDir = "$publishDir\AppCore"
        $libraryDir = "$appCoreDir\Library"
        $saveDir = "$appCoreDir\save"
        
        # 1. 建立外層與隱藏的核心層資料夾
        New-Item -ItemType Directory -Force -Path $libraryDir
        New-Item -ItemType Directory -Force -Path $saveDir
        
        # 2. 將主程式與設定檔放入 AppCore
        Copy-Item -Path "$releaseDir\DrawingApp.exe" -Destination $appCoreDir
        Copy-Item -Path "$releaseDir\DrawingApp.exe.config" -Destination $appCoreDir
        
        # 3. 將所有 DLL 移動到 AppCore\Library 內
        Get-ChildItem -Path $releaseDir -Filter *.dll | ForEach-Object {
            Copy-Item -Path $_.FullName -Destination $libraryDir
        }
        
        # 4. 處理 SQLite 的底層依賴庫 (x86/x64)
        if (Test-Path "$releaseDir\x86") { Copy-Item -Path "$releaseDir\x86" -Destination $appCoreDir -Recurse }
        if (Test-Path "$releaseDir\x64") { Copy-Item -Path "$releaseDir\x64" -Destination $appCoreDir -Recurse }

        # 5. 在根目錄建立相對路徑的「啟動捷徑 (BAT腳本)」
        # 使用 %~dp0 確保無論使用者在哪裡點擊，都能正確找到 AppCore 裡面的執行檔
        $batContent = "@echo off`r`nstart """" `"%~dp0AppCore\DrawingApp.exe`""
        Set-Content -Path "$publishDir\啟動繪圖軟體.bat" -Value $batContent -Encoding Default

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Portable_Drawing_App
        path: PublishOutput\

name: Build and Package Drawing App

on:
  workflow_dispatch: # 支援手動觸發

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v1.3.4

    - name: Restore NuGet Packages
      run: nuget restore DrawingApp.sln

    - name: Build Application
      run: msbuild DrawingApp.sln /p:Configuration=Release /p:TargetFrameworkVersion=v4.7.2

    - name: Reorganize Output (Move DLLs to Library)
      shell: pwsh
      run: |
        $releaseDir = "DrawingApp\bin\Release"
        $publishDir = "PublishOutput"
        $libraryDir = "$publishDir\Library"
        
        New-Item -ItemType Directory -Force -Path $libraryDir
        
        # 複製主程式與設定檔到根目錄
        Copy-Item -Path "$releaseDir\*.exe" -Destination $publishDir
        Copy-Item -Path "$releaseDir\*.exe.config" -Destination $publishDir
        
        # 複製所有依賴套件 (DLL) 到 Library 資料夾
        Get-ChildItem -Path $releaseDir -Filter *.dll | ForEach-Object {
            Copy-Item -Path $_.FullName -Destination $libraryDir
        }

    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: Portable_Drawing_App
        path: PublishOutput\

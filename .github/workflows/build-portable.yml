name: Build and Package Drawing App

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '7.0.x' 

    - name: Publish Application
      # 使用 dotnet publish 保證 100% 提取所有 NuGet 依賴檔案
      run: dotnet publish DrawingApp.csproj -c Release -f net472 -o ./PublishTemp

    - name: Reorganize Output (Clean Root Structure)
      shell: pwsh
      run: |
        $tempDir = "PublishTemp"
        $publishDir = "PublishOutput"
        $libraryDir = "$publishDir\Library"
        
        New-Item -ItemType Directory -Force -Path $publishDir
        New-Item -ItemType Directory -Force -Path $libraryDir
        
        # 1. 僅保留主程式與設定檔在最外層
        Copy-Item -Path "$tempDir\DrawingApp.exe" -Destination $publishDir
        Copy-Item -Path "$tempDir\DrawingApp.exe.config" -Destination $publishDir
        
        # 2. 將所有的 .dll 元件移動到 Library 資料夾
        Get-ChildItem -Path $tempDir -Filter *.dll | ForEach-Object {
            Move-Item -Path $_.FullName -Destination $libraryDir
        }
        
        # 3. 將 SQLite 底層組件 (x86/x64) 也一併移動到 Library 資料夾內
        if (Test-Path "$tempDir\x86") { Move-Item -Path "$tempDir\x86" -Destination $libraryDir }
        if (Test-Path "$tempDir\x64") { Move-Item -Path "$tempDir\x64" -Destination $libraryDir }

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Portable_Drawing_App
        path: PublishOutput\

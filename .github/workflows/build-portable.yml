name: Build and Package Drawing App

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '7.0.x' 

    - name: Publish Application
      # 確保所有依賴都會被完整的提取出來
      run: dotnet publish DrawingApp.csproj -c Release -f net472 -o ./PublishTemp

    - name: Reorganize Output (Absolute Precision)
      shell: pwsh
      run: |
        $tempDir = "PublishTemp"
        $publishDir = "PublishOutput"
        $libraryDir = "$publishDir\Library"
        
        # 1. 建立空資料夾
        New-Item -ItemType Directory -Force -Path $publishDir
        New-Item -ItemType Directory -Force -Path $libraryDir
        
        # 2. 將主程式與設定檔留在根目錄
        Move-Item -Path "$tempDir\DrawingApp.exe" -Destination "$publishDir\DrawingApp.exe" -Force
        if (Test-Path "$tempDir\DrawingApp.exe.config") {
            Move-Item -Path "$tempDir\DrawingApp.exe.config" -Destination "$publishDir\DrawingApp.exe.config" -Force
        }
        
        # 3. 搬移所有的 .dll 到 Library 內部
        Get-ChildItem -Path $tempDir -Filter *.dll | ForEach-Object {
            Move-Item -Path $_.FullName -Destination "$libraryDir\" -Force
        }
        
        # 4. 【確保 x86/x64 進到 Library 中】明確指定目標資料夾名稱
        if (Test-Path "$tempDir\x86") {
            Move-Item -Path "$tempDir\x86" -Destination "$libraryDir\x86" -Force
        }
        if (Test-Path "$tempDir\x64") {
            Move-Item -Path "$tempDir\x64" -Destination "$libraryDir\x64" -Force
        }

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Portable_Drawing_App
        path: PublishOutput\

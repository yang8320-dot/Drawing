name: Build Portable Notification Center

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Restore NuGet Packages (Dynamic Solution Find)
      shell: powershell
      run: |
        # 動態尋找儲存庫中所有的 .sln 檔案並還原套件
        $slnFiles = Get-ChildItem -Filter *.sln -Recurse
        if ($slnFiles.Count -eq 0) {
            Write-Error "Cannot find any .sln file in the repository!"
            exit 1
        }
        foreach ($sln in $slnFiles) {
            Write-Host "Restoring packages for: $($sln.FullName)"
            nuget restore $sln.FullName
        }

    - name: Build Project (Dynamic Solution Find)
      shell: powershell
      run: |
        $sln = Get-ChildItem -Filter *.sln -Recurse | Select-Object -First 1
        Write-Host "Building solution: $($sln.FullName)"
        msbuild $sln.FullName /p:Configuration=Release /p:Platform="Any CPU"

    - name: Organize Files and Folder Structure
      shell: powershell
      run: |
        # 建立 Portable 輸出結構
        $outDir = "PortableRelease"
        $libDir = "$outDir\Library"
        New-Item -ItemType Directory -Force -Path $libDir
        
        # 動態尋找編譯出的 .exe 檔案以定位 Release 目錄
        $exeFile = Get-ChildItem -Path . -Filter "*.exe" -Recurse | Where-Object { $_.FullName -match "\\bin\\Release\\" } | Select-Object -First 1
        if (-not $exeFile) {
            Write-Error "Cannot find compiled .exe file in bin\Release!"
            exit 1
        }
        $binDir = $exeFile.Directory.FullName
        Write-Host "Found build output directory: $binDir"
        
        # 搬移檔案：主程式與設定檔放根目錄，元件庫放 Library
        Copy-Item "$binDir\*.exe" -Destination $outDir
        Copy-Item "$binDir\*.config" -Destination $outDir
        Copy-Item "$binDir\*.dll" -Destination $libDir
        
        # 壓縮打包
        Compress-Archive -Path "$outDir\*" -DestinationPath "NotificationCenter_Portable.zip"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Portable-Notification-Center
        path: NotificationCenter_Portable.zip
